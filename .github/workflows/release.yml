name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cargo fmt -- --check
      - run: cargo check
      - run: cargo test
      - run: npm run release:check

  build-binaries:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            binary: target/release/srun.exe
            name: srun.exe
          - os: ubuntu-latest
            platform: linux-x64
            binary: target/release/srun
            name: srun
          - os: macos-latest
            platform: darwin-arm64
            binary: target/release/srun
            name: srun
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p "artifact/${{ matrix.platform }}"
          cp "${{ matrix.binary }}" "artifact/${{ matrix.platform }}/${{ matrix.name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: srun-${{ matrix.platform }}
          path: artifact/${{ matrix.platform }}/*
          if-no-files-found: error

  publish:
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          pattern: srun-*
          path: downloaded
      - name: Assemble npm package binaries
        shell: bash
        run: |
          mkdir -p npm/bin/win32-x64 npm/bin/linux-x64 npm/bin/darwin-arm64
          cp downloaded/srun-win32-x64/srun.exe npm/bin/win32-x64/srun.exe
          cp downloaded/srun-linux-x64/srun npm/bin/linux-x64/srun
          cp downloaded/srun-darwin-arm64/srun npm/bin/darwin-arm64/srun
          chmod +x npm/bin/linux-x64/srun npm/bin/darwin-arm64/srun
      - run: npm run release:check
      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
      - name: Publish GitHub Packages mirror
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "@engramresearch:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          npm publish --registry https://npm.pkg.github.com
